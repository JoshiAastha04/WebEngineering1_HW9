<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Mini Demo</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header>
        <h1>JavaScript Mini Demo</h1>
        <p class="subtitle">Built-In Objects &amp; DOM Manipulation</p>
    </header>

    <main>
        <!-- Part 1: Date Display -->
        <section class="card">
            <div class="card-tag">Part 1</div>
            <h2>📅 Date Display</h2>
            <p id="dateOutput">Date will appear here</p>
        </section>

        <!-- Part 2: Number Conversion -->
        <section class="card">
            <div class="card-tag">Part 2</div>
            <h2>🔢 Number Conversion Tests</h2>
            <div id="numberConversionOutput">Results will appear here</div>
        </section>

        <!-- Part 3: Math & Formatting -->
        <section class="card">
            <div class="card-tag">Part 3</div>
            <h2>➗ Math and Number Formatting</h2>
            <div id="mathOutput">Results will appear here</div>
        </section>

        <!-- Extra Credit: typeof section -->
        <section class="card extra">
            <div class="card-tag ec">Extra Credit</div>
            <h2>🔍 typeof Inspector</h2>
            <div id="typeofOutput">Results will appear here</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
